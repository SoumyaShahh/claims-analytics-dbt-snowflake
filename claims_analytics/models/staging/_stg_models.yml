version: 2

models:
  - name: stg_patients
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null
      - name: birth_date
        tests: [not_null]
      - name: gender
        tests:
          - accepted_values:
              values: ['M', 'F']
      - name: is_alive
        tests: [not_null]

  - name: stg_encounters
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id

  - name: stg_claims
    columns:
      - name: claim_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id

  - name: stg_conditions
    columns:
      - name: condition_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id

  - name: stg_providers
    columns:
      - name: provider_id
        tests:
          - unique
          - not_null
      - name: organization_id
        tests: [not_null]

  - name: stg_organizations
    columns:
      - name: organization_id
        tests:
          - unique
          - not_null

  - name: stg_payers
    columns:
      - name: payer_id
        tests:
          - unique
          - not_null
      - name: payer_name
        tests: [not_null]

  - name: stg_payer_transitions
    columns:
      - name: payer_transition_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id
