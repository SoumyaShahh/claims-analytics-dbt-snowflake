version: 2

models:
  - name: dim_patients
    columns:
      - name: patient_id
        tests: [unique, not_null]

  - name: dim_providers
    columns:
      - name: provider_id
        tests: [unique, not_null]

  - name: dim_payers
    columns:
      - name: payer_id
        tests: [unique, not_null]

  - name: dim_date
    columns:
      - name: date_key
        tests: [unique, not_null]

  - name: fct_claims
    columns:
      - name: claim_id
        tests: [unique, not_null]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_encounters
    columns:
      - name: encounter_id
        tests: [unique, not_null]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id
