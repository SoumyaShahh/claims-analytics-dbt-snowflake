<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a35"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7aa2f7"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">
    Healthcare Claims Analytics — End-to-End Architecture
  </text>
  <text x="600" y="65" text-anchor="middle" fill="#94a3b8" font-size="13">
    Synthea → Snowflake → dbt (layered) → Analytics marts → BI / CI-CD
  </text>

  <!-- Layer headings -->
  <g font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">
    <text x="130"  y="110">SOURCE</text>
    <text x="340"  y="110">RAW</text>
    <text x="550"  y="110">STAGING</text>
    <text x="760"  y="110">INTERMEDIATE</text>
    <text x="970"  y="110">MARTS (CORE)</text>
    <text x="1120" y="110">ANALYTICS</text>
  </g>

  <!-- Layer dividers -->
  <g stroke="#1e293b" stroke-dasharray="4,6">
    <line x1="235" y1="130" x2="235" y2="590"/>
    <line x1="445" y1="130" x2="445" y2="590"/>
    <line x1="655" y1="130" x2="655" y2="590"/>
    <line x1="865" y1="130" x2="865" y2="590"/>
    <line x1="1055" y1="130" x2="1055" y2="590"/>
  </g>

  <!-- SOURCE -->
  <g>
    <rect x="55" y="250" width="150" height="120" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="130" y="290" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Synthea CSVs</text>
    <text x="130" y="315" text-anchor="middle" fill="#94a3b8" font-size="11">Synthetic patient data</text>
    <text x="130" y="332" text-anchor="middle" fill="#94a3b8" font-size="11">1,163 patients</text>
    <text x="130" y="349" text-anchor="middle" fill="#94a3b8" font-size="11">~278K total rows</text>
  </g>

  <!-- RAW -->
  <g>
    <rect x="265" y="160" width="150" height="300" rx="10" fill="#172554" stroke="#3b82f6"/>
    <text x="340" y="185" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">CLAIMS_DB.RAW</text>
    <g fill="#cbd5e1" font-size="10.5" text-anchor="middle">
      <text x="340" y="215">RAW_PATIENTS</text>
      <text x="340" y="235">RAW_ENCOUNTERS</text>
      <text x="340" y="255">RAW_CLAIMS</text>
      <text x="340" y="275">RAW_CONDITIONS</text>
      <text x="340" y="295">RAW_PROVIDERS</text>
      <text x="340" y="315">RAW_ORGANIZATIONS</text>
      <text x="340" y="335">RAW_PAYERS</text>
      <text x="340" y="355">RAW_PAYER_TRANSITIONS</text>
    </g>
    <text x="340" y="395" text-anchor="middle" fill="#60a5fa" font-size="10" font-style="italic">8 tables</text>
    <text x="340" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">Loaded via Snowflake UI</text>
  </g>

  <!-- STAGING -->
  <g>
    <rect x="475" y="160" width="150" height="300" rx="10" fill="#064e3b" stroke="#10b981"/>
    <text x="550" y="185" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">STAGING</text>
    <g fill="#cbd5e1" font-size="10.5" text-anchor="middle">
      <text x="550" y="215">stg_patients</text>
      <text x="550" y="235">stg_encounters</text>
      <text x="550" y="255">stg_claims</text>
      <text x="550" y="275">stg_conditions</text>
      <text x="550" y="295">stg_providers</text>
      <text x="550" y="315">stg_organizations</text>
      <text x="550" y="335">stg_payers</text>
      <text x="550" y="355">stg_payer_transitions</text>
    </g>
    <text x="550" y="395" text-anchor="middle" fill="#34d399" font-size="10" font-style="italic">8 views</text>
    <text x="550" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">Rename, cast, clean</text>
  </g>

  <!-- INTERMEDIATE -->
  <g>
    <rect x="685" y="190" width="150" height="240" rx="10" fill="#3f1d38" stroke="#ec4899"/>
    <text x="760" y="215" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">INTERMEDIATE</text>
    <g fill="#cbd5e1" font-size="10.5" text-anchor="middle">
      <text x="760" y="250">int_patients_enriched</text>
      <text x="760" y="275">int_claims_with_encounters</text>
      <text x="760" y="300">int_patient_chronic_conditions</text>
    </g>
    <text x="760" y="350" text-anchor="middle" fill="#f472b6" font-size="10" font-style="italic">3 models</text>
    <text x="760" y="370" text-anchor="middle" fill="#94a3b8" font-size="10">Business logic prep</text>
    <text x="760" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">Joins &amp; derivations</text>
  </g>

  <!-- MARTS CORE -->
  <g>
    <rect x="895" y="170" width="150" height="290" rx="10" fill="#422006" stroke="#f59e0b"/>
    <text x="970" y="195" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">CORE</text>
    <text x="970" y="212" text-anchor="middle" fill="#fbbf24" font-size="10">Star schema</text>
    <g fill="#cbd5e1" font-size="10.5" text-anchor="middle">
      <text x="970" y="240">dim_patients</text>
      <text x="970" y="260">dim_providers</text>
      <text x="970" y="280">dim_payers</text>
      <text x="970" y="300">dim_date</text>
      <text x="970" y="325">fct_claims</text>
      <text x="970" y="345">fct_encounters</text>
    </g>
    <text x="970" y="395" text-anchor="middle" fill="#fbbf24" font-size="10" font-style="italic">6 tables</text>
    <text x="970" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">4 dims + 2 facts</text>
  </g>

  <!-- ANALYTICS -->
  <g>
    <rect x="1070" y="180" width="120" height="270" rx="10" fill="#450a0a" stroke="#ef4444"/>
    <text x="1130" y="205" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">ANALYTICS</text>
    <g fill="#cbd5e1" font-size="10" text-anchor="middle">
      <text x="1130" y="240">mart_member_</text>
      <text x="1130" y="253">cost_summary</text>
      <text x="1130" y="280">mart_provider_</text>
      <text x="1130" y="293">performance</text>
      <text x="1130" y="320">mart_payer_</text>
      <text x="1130" y="333">analytics</text>
      <text x="1130" y="360">mart_chronic_</text>
      <text x="1130" y="373">condition_costs</text>
    </g>
    <text x="1130" y="415" text-anchor="middle" fill="#f87171" font-size="10" font-style="italic">4 business marts</text>
  </g>

  <!-- Arrows -->
  <g stroke="#7aa2f7" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="210" y1="310" x2="260" y2="310"/>
    <line x1="420" y1="310" x2="470" y2="310"/>
    <line x1="630" y1="310" x2="680" y2="310"/>
    <line x1="840" y1="310" x2="890" y2="310"/>
    <line x1="1050" y1="310" x2="1065" y2="310"/>
  </g>

  <!-- Bottom ribbon: tests / docs / ci -->
  <g>
    <rect x="55" y="505" width="1135" height="70" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="80" y="530" fill="#94a3b8" font-size="11" font-weight="700">QUALITY &amp; OPS</text>
    <g font-size="12" fill="#e2e8f0">
      <text x="80" y="555">✓ 57 dbt data tests (unique, not_null, relationships, accepted_values)</text>
      <text x="550" y="555">✓ dbt docs (lineage + column-level)</text>
      <text x="870" y="555">✓ GitHub Actions CI on every PR</text>
    </g>
  </g>
</svg>